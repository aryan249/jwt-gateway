apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-gateway
  labels:
    app: jwt-gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: jwt-gateway
  template:
    metadata:
      labels:
        app: jwt-gateway
    spec:
      containers:
        - name: jwt-gateway
          image: jwt-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: jwt-gateway-secrets
                  key: redis-url
            - name: JWKS_URI
              valueFrom:
                configMapKeyRef:
                  name: jwt-gateway-config
                  key: jwks-uri
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: jwt-gateway-config
                  key: jwt-issuer
            - name: JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: jwt-gateway-config
                  key: jwt-audience
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: jwt-gateway-secrets
                  key: sentry-dsn
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
# Liveness and readiness probes configured
